<!DOCTYPE html>
<html>
<head>
  <title>Gym Routine - Secure Fitness Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-container">
    <h1>My Gym Routine</h1>

    <div class="routine-card">
      <h3>Add / Edit Exercise</h3>

      <input type="hidden" id="editId">

      <select id="day">
        <option value="">Select Day</option>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
        <option value="Sunday">Sunday</option>
      </select>

      <input type="text" id="exercise" placeholder="Exercise name">
      <input type="text" id="setsReps" placeholder="Sets and reps, e.g. 4 sets x 10 reps">
      <textarea id="working" placeholder="Exercise working / benefits"></textarea>

      <button onclick="saveExercise()">Save Exercise</button>
    </div>

    <h2>My Selected Exercises</h2>

    <div id="exerciseList"></div>

    <a href="dashboard.html">
      <button>Back to Dashboard</button>
    </a>
  </div>

  <script>
    const email = localStorage.getItem("userEmail");

    if (!email) {
      window.location.href = "login.html";
    }

    async function loadExercises() {
      const response = await fetch(`/exercises?email=${email}`);
      const exercises = await response.json();

      const list = document.getElementById("exerciseList");
      list.innerHTML = "";

      if (exercises.length === 0) {
        list.innerHTML = "<p>No exercises added yet.</p>";
        return;
      }

      exercises.forEach(item => {
        const card = document.createElement("div");
        card.className = "routine-card";

        card.innerHTML = `
          <h3>${item.day} - ${item.exercise}</h3>
          <p><b>Sets/Reps:</b> ${item.setsReps}</p>
          <p><b>Working:</b> ${item.working}</p>

          <button onclick="editExercise(${item.id}, '${item.day}', '${item.exercise}', '${item.setsReps}', '${item.working}')">
            Edit
          </button>

          <button onclick="deleteExercise(${item.id})">
            Delete
          </button>
        `;

        list.appendChild(card);
      });
    }

    async function saveExercise() {
      const editId = document.getElementById("editId").value;
      const day = document.getElementById("day").value;
      const exercise = document.getElementById("exercise").value;
      const setsReps = document.getElementById("setsReps").value;
      const working = document.getElementById("working").value;

      if (!day || !exercise || !setsReps || !working) {
        alert("Please fill all fields");
        return;
      }

      const data = {
        email,
        day,
        exercise,
        setsReps,
        working
      };

      if (editId) {
        await fetch(`/exercises/${editId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        alert("Exercise updated");
      } else {
        await fetch("/exercises", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        alert("Exercise added");
      }

      clearForm();
      loadExercises();
    }

    function editExercise(id, day, exercise, setsReps, working) {
      document.getElementById("editId").value = id;
      document.getElementById("day").value = day;
      document.getElementById("exercise").value = exercise;
      document.getElementById("setsReps").value = setsReps;
      document.getElementById("working").value = working;
    }

    async function deleteExercise(id) {
      const confirmDelete = confirm("Are you sure you want to delete this exercise?");

      if (!confirmDelete) return;

      await fetch(`/exercises/${id}`, {
        method: "DELETE"
      });

      alert("Exercise deleted");
      loadExercises();
    }

    function clearForm() {
      document.getElementById("editId").value = "";
      document.getElementById("day").value = "";
      document.getElementById("exercise").value = "";
      document.getElementById("setsReps").value = "";
      document.getElementById("working").value = "";
    }

    loadExercises();
  </script>

</body>
</html>
